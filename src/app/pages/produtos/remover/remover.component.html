<div class="form-page animate-in">
  <h2>■ REMOVER PRODUTO</h2>

  <form (ngSubmit)="removerItem()" class="remove-form">
    <label for="input-id">CÓDIGO DO PRODUTO:</label>
    <input type="text" id="input-id" name="codigoExcluir" [(ngModel)]="codigoExcluir" required />
    <button type="submit" class="btn" style="border-color: #ff2020; color: #ff2020;">
      REMOVER
    </button>
  </form>

  @if (erroMensagem) {
    <div class="erro-msg">{{ erroMensagem }}</div>
  }
</div>
